<!-- Admin Edit Modal -->
<div class="relative">
  
  <!-- Close button -->
  <button id="modal-close"
          onclick="closeModal(event)"
          class="absolute top-4 right-4 z-10 text-charcoal/40 hover:text-charcoal text-2xl leading-none"
          aria-label="Fechar">×</button>

  <!-- Body -->
  <div class="p-8">
    <p class="font-body text-xs tracking-[.3em] uppercase text-muted mb-1">Administração</p>
    <h2 class="font-display text-2xl font-light text-charcoal mb-6">Editar Convite</h2>
    
    {% if error %}
      <div class="bg-red-50 text-red-700 border border-red-200 p-4 rounded-sm font-body text-sm mb-4">
        {{ error }}
      </div>
    {% endif %}

    <form hx-post="/admin/convite/{{ group.id }}/editar"
          hx-target="#modal-content"
          hx-swap="innerHTML"
          class="space-y-5">
      
      <div>
        <label class="font-body text-xs tracking-wider text-charcoal/60 uppercase block mb-1">
          Nome no Convite
        </label>
        <input type="text"
               name="name"
               value="{{ group.name }}"
               required
               class="w-full bg-cream/30 border border-charcoal/20 focus:border-sage font-body px-3 py-2 text-sm outline-none rounded-sm">
      </div>

      <div>
        <label class="font-body text-xs tracking-wider text-charcoal/60 uppercase block mb-1">
          Vagas
        </label>
        <input type="number"
               name="max_guests"
               min="1"
               max="20"
               value="{{ group.max_guests }}"
               required
               class="w-full bg-cream/30 border border-charcoal/20 focus:border-sage font-body px-3 py-2 text-sm outline-none rounded-sm">
      </div>

      <div>
        <label class="font-body text-xs tracking-wider text-charcoal/60 uppercase block mb-1">
          Telefone <span class="text-charcoal/30">(opcional)</span>
        </label>
        <input type="text"
               name="phone"
               value="{{ group.phone or '' }}"
               placeholder="(11) 99999-9999"
               class="w-full bg-cream/30 border border-charcoal/20 focus:border-sage font-body px-3 py-2 text-sm outline-none rounded-sm">
      </div>

      <!-- Convidados aninhados -->
      <div class="border-t border-charcoal/10 pt-4 mt-4">
        <label class="font-body text-xs tracking-wider text-charcoal/60 uppercase block mb-3">
          Nomes dos Convidados <span class="text-charcoal/30">(opcionalmente adicione filhos/acompanhantes)</span>
        </label>
        <div id="guest-inputs" class="space-y-2">
          {% for guest in group.guest_names %}
          <div class="flex gap-2">
            <input type="text"
                   name="guest_names"
                   value="{{ guest }}"
                   placeholder="Nome do convidado"
                   class="flex-1 bg-cream/30 border border-charcoal/20 focus:border-sage font-body px-3 py-2 text-sm outline-none rounded-sm">
            <button type="button"
                    onclick="this.parentElement.remove()"
                    class="px-3 py-2 border border-red-200 hover:bg-red-50 text-red-600 text-xs rounded-sm transition-colors">
              ✕
            </button>
          </div>
          {% endfor %}
        </div>
        <button type="button"
                onclick="addGuestInput()"
                class="mt-3 w-full border border-charcoal/20 hover:bg-charcoal/5 text-charcoal font-body text-xs tracking-wider uppercase py-2 rounded-sm transition-colors">
          + Adicionar Convidado
        </button>
      </div>

      <div class="pt-2 flex gap-3">
        <button type="button"
                onclick="closeModal({target: document.getElementById('modal-backdrop')})"
                class="flex-1 border border-charcoal/20 hover:bg-charcoal/5 font-body text-xs tracking-widest uppercase py-3 transition-colors rounded-sm">
          Cancelar
        </button>
        <button type="submit"
                class="flex-1 bg-charcoal text-cream hover:bg-sage font-body text-xs tracking-widest uppercase py-3 transition-colors rounded-sm">
          Salvar Alterações
        </button>
      </div>

    </form>

    <script>
      function addGuestInput() {
        const container = document.getElementById('guest-inputs');
        const div = document.createElement('div');
        div.className = 'flex gap-2';
        div.innerHTML = `
          <input type="text"
                 name="guest_names"
                 placeholder="Nome do convidado"
                 class="flex-1 bg-cream/30 border border-charcoal/20 focus:border-sage font-body px-3 py-2 text-sm outline-none rounded-sm">
          <button type="button"
                  onclick="this.parentElement.remove()"
                  class="px-3 py-2 border border-red-200 hover:bg-red-50 text-red-600 text-xs rounded-sm transition-colors">
            ✕
          </button>
        `;
        container.appendChild(div);
      }
    </script>
  </div>
</div>
