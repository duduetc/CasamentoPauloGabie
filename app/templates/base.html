<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Gabriela & Paulo Isaque{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/images/favicon.ico" />
  <link rel="shortcut icon" href="/static/images/favicon.ico" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>

  <style>
    @font-face {
      font-family: 'AltesseStd';
      src: url('/static/fonts/altesse-std.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'IvyOraDisplay';
      src: url('/static/fonts/ivy-ora-display.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'BaskervillePro';
      src: url('/static/fonts/baskerville-pro-regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:   '#F5F0E8',
            noir:    '#111111',
            charcoal:'#2D2D2B',
            sage:    '#7A9E7E',
            muted:   '#808080',
          },
          fontFamily: {
            script:  ['AltesseStd', 'cursive'],
            display: ['IvyOraDisplay', 'serif'],
            body:    ['BaskervillePro', 'serif'],
          },
        }
      }
    }
  </script>

  <style>
    html { scroll-behavior: smooth; }
    body { background-color: #F5F0E8; color: #111111; font-family: 'EB Garamond', serif; }

    /* thin horizontal rule used in brand guide */
    .rule { border-top: 1px solid #2D2D2B; width: 2rem; }

    /* nav link hover */
    .nav-link { position: relative; }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0;
      width: 0; height: 1px;
      background: #7A9E7E;
      transition: width .35s ease;
    }
    .nav-link:hover::after { width: 100%; }

    /* modal backdrop */
    #modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(17,17,17,.55);
      backdrop-filter: blur(4px);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }
    #modal-backdrop.open { display: flex; }

    /* music toggle */
    .music-toggle {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 60;
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      padding: .65rem .9rem;
      border: 1px solid rgba(17,17,17,.16);
      border-radius: 999px;
      background: rgba(245,240,232,.9);
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 20px rgba(17,17,17,.12);
      color: #111111;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .music-toggle:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(17,17,17,.16); }
    .vinyl-disc {
      position: relative;
      width: 1.1rem;
      height: 1.1rem;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 35%, #f7f2e7 0, #d8c79c 25%, #2d2d2b 26%, #111 100%);
      border: 2px solid #111;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .vinyl-disc::before {
      content: '';
      width: .38rem;
      height: .38rem;
      border-radius: 999px;
      background: #f5f0e8;
      border: 1px solid rgba(17,17,17,.3);
    }
    .music-toggle .music-label { font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; font-family: 'BaskervillePro', serif; }
    .music-toggle.is-paused { opacity: .75; }
  </style>

  {% block head %}{% endblock %}
</head>
<body class="min-h-screen">

  <button id="music-toggle" class="music-toggle is-paused" type="button" aria-label="Tocar música" aria-pressed="false">
    <span class="vinyl-disc" aria-hidden="true"></span>
  </button>

  <audio id="site-audio" preload="auto" autoplay data-playlist="/static/audio/10_000Hours-JB.mp3,/static/audio/Dancing.mp3,/static/audio/FinalFeliz-JorgeVercillo.mp3,/static/audio/ThisLoveOfMine-FrankSinatra.mp3"></audio>

  <!-- ── Navigation ─────────────────────────────────────────────── -->
  <nav class="fixed top-0 left-0 right-0 z-40 bg-cream/90 backdrop-blur-sm border-b border-charcoal/10">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/"><img src="/static/images/monograma.png" alt="G & P" class="h-12 w-auto"></a>
      <ul class="flex gap-8 text-sm font-body tracking-widest uppercase text-charcoal/70">
        <li><a href="/" class="nav-link hover:text-charcoal transition-colors">Início</a></li>
        <li><a href="/presentes" class="nav-link hover:text-charcoal transition-colors">Presentes</a></li>
        <li><a href="/confirmacao" class="nav-link hover:text-charcoal transition-colors">Confirmar Presença</a></li>
      </ul>
    </div>
  </nav>

  <!-- ── Page content ───────────────────────────────────────────── -->
  <main class="pt-16">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ─────────────────────────────────────────────────── -->
  <footer class="border-t border-charcoal/10 py-10 mt-24">
    <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
      <p class="font-script text-xl text-charcoal/60">Gabriela & Paulo Isaque</p>
      <p class="font-body text-xs text-muted tracking-widest uppercase">Com amor — 2026</p>
    </div>
  </footer>

  <!-- ── Modal backdrop ─────────────────────────────────────────── -->
  <div id="modal-backdrop" onclick="closeModal(event)">
    <div id="modal-content" class="relative bg-cream w-full max-w-lg mx-4 rounded-sm shadow-2xl max-h-[90vh] overflow-y-auto">
      <!-- filled by HTMX -->
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById('modal-backdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal(e) {
      if (e.target === document.getElementById('modal-backdrop') || e.currentTarget === document.getElementById('modal-close')) {
        document.getElementById('modal-backdrop').classList.remove('open');
        document.body.style.overflow = '';
        document.getElementById('modal-content').innerHTML = '';
      }
    }
    // open modal after HTMX loads content into #modal-content
    document.body.addEventListener('htmx:afterSwap', function(e) {
      if (e.detail.target.id === 'modal-content') openModal();
    });

    // copy PIX code helper
    function copyPix(code) {
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copy-btn');
        if (!btn) return;
        btn.textContent = 'Copiado!';
        btn.classList.add('bg-sage','text-cream');
        setTimeout(() => {
          btn.textContent = 'Copiar código PIX';
          btn.classList.remove('bg-sage','text-cream');
        }, 2000);
      });
    }
  </script>

  <script src="/static/js/ui.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
